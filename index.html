<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atelier Amr — Interior Design Studio</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet" />

  <!-- React 18 + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: #F5F1ED;
      color: #2C2C2C;
      font-family: 'DM Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button { font-family: inherit; }
    input, textarea, select {
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 14px;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #F5F1ED; }
    ::-webkit-scrollbar-thumb { background: #D4C5B9; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #8B7355; }

    /* ── Scroll-reveal system ── */
    :root {
      --az-dur:  0.72s;
      --az-ease: cubic-bezier(0.22, 1, 0.36, 1);
      --az-dy:   36px;
    }
    [data-az] {
      transition:
        opacity   var(--az-dur) var(--az-ease) var(--az-del, 0s),
        transform var(--az-dur) var(--az-ease) var(--az-del, 0s);
    }
    [data-az]:not(.az-in)        { opacity: 0; }
    [data-az="rise"]:not(.az-in) { transform: translateY(var(--az-dy)); }
    [data-az="scale"]:not(.az-in){ transform: scale(0.94); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    window.__MOTION_DEFAULTS__ = {
      "motionEnabled": true,
      "revealStyle": "scale",
      "speed": "slow",
      "dy": 32,
      "stagger": true
    };
  </script>

  <script type="text/babel">
    // ─────────────────────────────────────────────────────────
    // SHARED TOKENS & COMPONENTS
    // ─────────────────────────────────────────────────────────

    const THEME = {
      cream:     '#F5F1ED',
      walnut:    '#8B7355',
      sand:      '#D4C5B9',
      charcoal:  '#2C2C2C',
      sandLight: 'rgba(212,197,185,0.18)'
    };

    const F = {
      display: "'Cormorant Garamond', Georgia, serif",
      body:    "'DM Sans', system-ui, sans-serif"
    };

    function Eyebrow({ children, light, style }) {
      return (
        <span style={{
          display: 'block',
          fontFamily: F.body,
          fontSize: 11,
          letterSpacing: '0.32em',
          textTransform: 'uppercase',
          fontWeight: 700,
          color: light ? 'rgba(245,241,237,0.5)' : THEME.walnut,
          ...(style || {})
        }}>
          {children}
        </span>
      );
    }

    function Rule({ light, style }) {
      return (
        <hr style={{
          border: 'none',
          borderTop: `1px solid ${light ? 'rgba(245,241,237,0.12)' : 'rgba(44,44,44,0.1)'}`,
          margin: 0,
          ...(style || {})
        }} />
      );
    }

    function Img({ src, alt, style }) {
      const uid = React.useMemo(() => 'i' + Math.random().toString(36).slice(2, 8), []);
      const [err, setErr] = React.useState(false);

      if (err || !src) {
        return (
          <div style={{ background: THEME.sand, position: 'relative', overflow: 'hidden', ...style }}>
            <svg style={{ position: 'absolute', inset: 0, width: '100%', height: '100%' }} xmlns="http://www.w3.org/2000/svg">
              <defs>
                <pattern id={uid} patternUnits="userSpaceOnUse" width="22" height="22" patternTransform="rotate(45)">
                  <rect width="11" height="22" fill={THEME.cream} opacity="0.55" />
                </pattern>
              </defs>
              <rect width="100%" height="100%" fill={`url(#${uid})`} />
            </svg>
            {alt && (
              <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <span style={{
                  fontFamily: 'monospace', fontSize: 10, letterSpacing: '0.2em',
                  textTransform: 'uppercase', color: THEME.walnut,
                  background: 'rgba(245,241,237,0.82)', padding: '5px 12px'
                }}>{alt}</span>
              </div>
            )}
          </div>
        );
      }

      return (
        <img
          src={src}
          alt={alt || ''}
          onError={() => setErr(true)}
          style={{ display: 'block', objectFit: 'cover', ...style }}
        />
      );
    }

    // ── Parallax hook (card images) ──────────────────────────
    function useParallaxCard(strength) {
      const containerRef = React.useRef(null);
      const imgRef = React.useRef(null);
      React.useEffect(() => {
        if (!strength) return;
        let raf = null;
        const update = () => {
          const el = containerRef.current;
          const img = imgRef.current;
          if (!el || !img) return;
          const rect = el.getBoundingClientRect();
          const vh = window.innerHeight;
          const progress = (vh - rect.top) / (vh + rect.height);
          const clamped = Math.max(0, Math.min(1, progress));
          const offset = (clamped - 0.5) * strength * 2;
          img.style.translate = `0 ${-offset}px`;
        };
        const onScroll = () => {
          if (raf) cancelAnimationFrame(raf);
          raf = requestAnimationFrame(update);
        };
        window.addEventListener('scroll', onScroll, { passive: true });
        update();
        return () => {
          window.removeEventListener('scroll', onScroll);
          if (raf) cancelAnimationFrame(raf);
        };
      }, [strength]);
      return { containerRef, imgRef };
    }

    // ── ParallaxImg (full-bleed sections) ────────────────────
    function ParallaxImg({ src, alt, strength = 80 }) {
      const uid = React.useMemo(() => 'i' + Math.random().toString(36).slice(2, 8), []);
      const [err, setErr] = React.useState(false);
      const containerRef = React.useRef(null);
      const imgRef = React.useRef(null);

      React.useEffect(() => {
        let raf = null;
        const update = () => {
          const el = containerRef.current;
          const img = imgRef.current;
          if (!el || !img) return;
          const rect = el.getBoundingClientRect();
          const vh = window.innerHeight;
          const progress = (vh - rect.top) / (vh + rect.height);
          const clamped = Math.max(0, Math.min(1, progress));
          const offset = (clamped - 0.5) * strength * 2;
          img.style.translate = `0 ${-offset}px`;
        };
        const onScroll = () => {
          if (raf) cancelAnimationFrame(raf);
          raf = requestAnimationFrame(update);
        };
        window.addEventListener('scroll', onScroll, { passive: true });
        update();
        return () => {
          window.removeEventListener('scroll', onScroll);
          if (raf) cancelAnimationFrame(raf);
        };
      }, [strength]);

      if (err || !src) {
        return (
          <div ref={containerRef} style={{ position: 'absolute', inset: 0, overflow: 'hidden', background: THEME.sand }}>
            <svg style={{ position: 'absolute', inset: 0, width: '100%', height: '100%' }} xmlns="http://www.w3.org/2000/svg">
              <defs>
                <pattern id={uid} patternUnits="userSpaceOnUse" width="22" height="22" patternTransform="rotate(45)">
                  <rect width="11" height="22" fill={THEME.cream} opacity="0.55" />
                </pattern>
              </defs>
              <rect width="100%" height="100%" fill={`url(#${uid})`} />
            </svg>
            {alt && (
              <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <span style={{ fontFamily: 'monospace', fontSize: 10, letterSpacing: '0.2em', textTransform: 'uppercase', color: THEME.walnut, background: 'rgba(245,241,237,0.82)', padding: '5px 12px' }}>{alt}</span>
              </div>
            )}
          </div>
        );
      }

      return (
        <div ref={containerRef} style={{ position: 'absolute', inset: 0, overflow: 'hidden' }}>
          <img
            ref={imgRef}
            src={src}
            alt={alt || ''}
            onError={() => setErr(true)}
            style={{
              display: 'block',
              width: '100%',
              height: `calc(100% + ${strength * 2}px)`,
              objectFit: 'cover',
              willChange: 'translate',
              marginTop: `-${strength}px`
            }}
          />
        </div>
      );
    }

    function BtnPrimary({ children, onClick, to, nav }) {
      const [h, setH] = React.useState(false);
      return (
        <button
          onClick={to ? () => nav(to) : onClick}
          onMouseOver={() => setH(true)}
          onMouseOut={() => setH(false)}
          style={{
            display: 'inline-flex', alignItems: 'center',
            padding: '14px 38px', border: 'none', cursor: 'pointer',
            background: h ? THEME.walnut : THEME.charcoal,
            color: THEME.cream,
            fontFamily: F.body, fontSize: 11, letterSpacing: '0.25em', textTransform: 'uppercase',
            transition: 'background 0.25s'
          }}>
          {children}
        </button>
      );
    }

    function BtnOutline({ children, onClick, to, nav, light }) {
      const [h, setH] = React.useState(false);
      const fg  = light ? THEME.cream : THEME.charcoal;
      const bdr = light ? 'rgba(245,241,237,0.38)' : THEME.charcoal;
      return (
        <button
          onClick={to ? () => nav(to) : onClick}
          onMouseOver={() => setH(true)}
          onMouseOut={() => setH(false)}
          style={{
            display: 'inline-flex', alignItems: 'center',
            padding: '14px 38px', cursor: 'pointer',
            background: h ? (light ? 'rgba(245,241,237,0.08)' : THEME.charcoal) : 'transparent',
            color: h ? THEME.cream : fg,
            border: `1px solid ${bdr}`,
            fontFamily: F.body, fontSize: 11, letterSpacing: '0.25em', textTransform: 'uppercase',
            transition: 'all 0.25s'
          }}>
          {children}
        </button>
      );
    }


    // ─────────────────────────────────────────────────────────
    // NAVBAR
    // ─────────────────────────────────────────────────────────

    function ZMark({ color }) {
      return (
        <svg viewBox="0 0 75 75" width="34" height="34" fill={color} xmlns="http://www.w3.org/2000/svg"
          style={{ display: 'block', transition: 'fill 0.4s', flexShrink: 0 }}>
          <polygon points="0,22 18,4 68,4 68,40 18,40" />
          <polygon points="6,47 70,47 46,72" />
        </svg>
      );
    }

    function AtNavbar({ page, nav }) {
      const [scrolled, setScrolled] = React.useState(false);

      React.useEffect(() => {
        const fn = () => setScrolled(window.scrollY > 24);
        fn();
        window.addEventListener('scroll', fn, { passive: true });
        return () => window.removeEventListener('scroll', fn);
      }, []);

      const links = [
        { id: 'about',    label: 'About'    },
        { id: 'services', label: 'Services' },
        { id: 'projects', label: 'Projects' },
        { id: 'contact',  label: 'Contact'  },
      ];

      const onDark = !scrolled;
      const fg     = onDark ? THEME.cream : THEME.charcoal;

      return (
        <header style={{
          position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
          background: scrolled ? 'rgba(245,241,237,0.96)' : 'transparent',
          backdropFilter: scrolled ? 'blur(14px)' : 'none',
          borderBottom: `1px solid ${scrolled ? 'rgba(44,44,44,0.07)' : 'transparent'}`,
          transition: 'background 0.4s, border-color 0.4s',
        }}>
          <div style={{
            maxWidth: 1280, margin: '0 auto', padding: '0 60px', height: 72,
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          }}>
            {/* Logo */}
            <button onClick={() => nav('home')} style={{
              display: 'flex', alignItems: 'center', gap: 14,
              background: 'none', border: 'none', cursor: 'pointer', padding: 0,
            }}>
              <ZMark color={fg} />
              <span style={{
                fontFamily: "'Josefin Sans', 'DM Sans', sans-serif",
                fontSize: 15, fontWeight: 600, letterSpacing: '0.2em',
                textTransform: 'uppercase',
                color: fg,
                transition: 'color 0.4s',
              }}>
                AMR ZIADA
              </span>
            </button>

            {/* Nav links */}
            <nav style={{ display: 'flex', alignItems: 'center', gap: 38 }}>
              {links.map((l) => (
                <NavLink
                  key={l.id}
                  label={l.label}
                  active={page === l.id}
                  onClick={() => nav(l.id)}
                  onDark={onDark}
                />
              ))}
            </nav>

            {/* CTA */}
            <BookBtn onClick={() => nav('contact')} onDark={onDark} />
          </div>
        </header>
      );
    }

    function NavLink({ label, active, onClick, onDark }) {
      const [h, setH] = React.useState(false);
      const base  = onDark ? 'rgba(245,241,237,0.68)' : THEME.charcoal;
      const hover = onDark ? THEME.cream : THEME.walnut;
      return (
        <button
          onClick={onClick}
          onMouseOver={() => setH(true)}
          onMouseOut={() => setH(false)}
          style={{
            background: 'none', border: 'none', cursor: 'pointer', padding: '4px 0',
            fontFamily: F.body, fontSize: 11, letterSpacing: '0.22em', textTransform: 'uppercase',
            color: active || h ? hover : base,
            borderBottom: `1px solid ${active ? hover : 'transparent'}`,
            transition: 'color 0.2s, border-color 0.2s',
          }}>
          {label}
        </button>
      );
    }

    function BookBtn({ onClick, onDark }) {
      const [h, setH] = React.useState(false);
      const borderColor = onDark ? 'rgba(245,241,237,0.55)' : THEME.charcoal;
      return (
        <button
          onClick={onClick}
          onMouseOver={() => setH(true)}
          onMouseOut={() => setH(false)}
          style={{
            background: h ? (onDark ? THEME.cream : THEME.charcoal) : 'transparent',
            border: `1px solid ${borderColor}`,
            color: h ? (onDark ? THEME.charcoal : THEME.cream) : (onDark ? THEME.cream : THEME.charcoal),
            fontFamily: F.body, fontSize: 11, letterSpacing: '0.22em',
            textTransform: 'uppercase', padding: '10px 24px',
            cursor: 'pointer', transition: 'all 0.25s', whiteSpace: 'nowrap',
          }}>
          Book Consult
        </button>
      );
    }


    // ─────────────────────────────────────────────────────────
    // FOOTER
    // ─────────────────────────────────────────────────────────

    function AtFooter({ nav }) {
      const cols = [
        { label: 'Studio', links: [
          { l: 'About',    p: 'about'    },
          { l: 'Services', p: 'services' },
          { l: 'Projects', p: 'projects' },
          { l: 'Contact',  p: 'contact'  },
        ]},
        { label: 'Contact', links: [
          { l: '14 Olive Lane, Suite 3',     p: null },
          { l: 'Lisbon, Portugal',           p: null },
          { l: 'hello@atelieramr.com',       p: null },
          { l: '+351 910 200 333',           p: null },
        ]},
      ];

      return (
        <footer style={{ background: THEME.charcoal, color: THEME.cream }}>
          <div style={{
            maxWidth: 1280, margin: '0 auto',
            padding: '72px 60px 48px',
            display: 'grid', gridTemplateColumns: '2fr 1fr 1fr', gap: 48,
          }}>
            {/* Brand */}
            <div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 20 }}>
                <svg viewBox="0 0 70 68" width="30" height="29" fill={THEME.cream} xmlns="http://www.w3.org/2000/svg" style={{ display: 'block', flexShrink: 0 }}>
                  <polygon points="0,21 20,3 66,3 66,23 20,41" />
                  <polygon points="4,45 4,65 46,65 66,55 46,45" />
                </svg>
                <span style={{
                  fontFamily: "'Josefin Sans', 'DM Sans', sans-serif",
                  fontSize: 14, fontWeight: 600, letterSpacing: '0.2em',
                  textTransform: 'uppercase', color: THEME.cream,
                }}>
                  AMR ZIADA
                </span>
              </div>
              <p style={{
                fontFamily: F.body, fontSize: 14, color: 'rgba(245,241,237,0.55)',
                lineHeight: 1.75, maxWidth: 300, fontWeight: 300,
              }}>
                A boutique interior design studio crafting warm, considered spaces where modern clarity meets the soul of natural materials.
              </p>
            </div>

            {/* Link columns */}
            {cols.map(col => (
              <div key={col.label}>
                <Eyebrow light style={{ marginBottom: 20 }}>{col.label}</Eyebrow>
                <ul style={{ listStyle: 'none', padding: 0, margin: 0, display: 'flex', flexDirection: 'column', gap: 12 }}>
                  {col.links.map(lk => (
                    <li key={lk.l}>
                      {lk.p ? (
                        <FooterLink label={lk.l} onClick={() => nav(lk.p)} />
                      ) : (
                        <span style={{ fontFamily: F.body, fontSize: 13, color: 'rgba(245,241,237,0.6)', fontWeight: 300 }}>{lk.l}</span>
                      )}
                    </li>
                  ))}
                </ul>
              </div>
            ))}
          </div>

          <Rule light />

          <div style={{
            maxWidth: 1280, margin: '0 auto',
            padding: '22px 60px',
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          }}>
            <span style={{ fontFamily: F.body, fontSize: 11, color: 'rgba(245,241,237,0.35)', letterSpacing: '0.05em' }}>
              © {new Date().getFullYear()} Atelier Amr. All rights reserved.
            </span>
            <span style={{ fontFamily: F.body, fontSize: 11, color: 'rgba(245,241,237,0.3)', letterSpacing: '0.22em', textTransform: 'uppercase' }}>
              Designed with quiet intent.
            </span>
          </div>
        </footer>
      );
    }

    function FooterLink({ label, onClick }) {
      const [h, setH] = React.useState(false);
      return (
        <button onClick={onClick} onMouseOver={() => setH(true)} onMouseOut={() => setH(false)}
          style={{
            background: 'none', border: 'none', cursor: 'pointer', padding: 0,
            fontFamily: F.body, fontSize: 13, fontWeight: 300,
            color: h ? THEME.sand : 'rgba(245,241,237,0.65)',
            transition: 'color 0.2s',
          }}>{label}</button>
      );
    }


    // ─────────────────────────────────────────────────────────
    // HOME PAGE
    // ─────────────────────────────────────────────────────────

    function HomePage({ nav }) {
      const stats = [
        { n: '15+', l: 'Years of Practice'  },
        { n: '180', l: 'Completed Projects'  },
        { n: '65',  l: 'Design Awards'       },
        { n: '3',   l: 'Countries'           },
      ];

      const services = [
        { num: '01', title: 'Facade Design',  desc: 'Architecture-led exteriors with material honesty — from massing to final elevation.' },
        { num: '02', title: 'Interior Design', desc: 'Full-service interiors from concept to install. Every millimetre considered.' },
        { num: '03', title: 'Decoration',      desc: 'Curated styling, art curation, and the small objects that complete a room.' },
      ];

      return (
        <div>
          {/* ── Hero ── */}
          <section style={{ position: 'relative', height: '100vh', overflow: 'hidden', display: 'flex', alignItems: 'flex-end' }}>
            <ParallaxImg src="assets/images/home1.jpg" alt="hero interior" />
            <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(to top, rgba(20,18,16,0.88) 0%, rgba(20,18,16,0.4) 55%, rgba(20,18,16,0.08) 100%)' }} />
            <div style={{ position: 'relative', zIndex: 1, width: '100%', maxWidth: 1280, margin: '0 auto', padding: '0 60px 80px' }}>
              <Eyebrow light></Eyebrow>
              <h1 style={{
                fontFamily: F.display, fontWeight: 300,
                fontSize: 'clamp(52px, 7vw, 104px)',
                lineHeight: 1.0, color: THEME.cream,
                margin: '22px 0 0', letterSpacing: '-0.01em',
              }}>
                Interiors<br />Designed<br />With Intent.
              </h1>
              <p style={{
                fontFamily: F.body, fontSize: 15, fontWeight: 300,
                color: 'rgba(245,241,237,0.65)', lineHeight: 1.75,
                maxWidth: 380, margin: '28px 0 0'
              }}>
                A small, deliberate studio working closely with clients to create
                spaces that feel both modern and quietly inevitable.
              </p>
              <div style={{ display: 'flex', gap: 14, marginTop: 40 }}>
                <BtnPrimary nav={nav} to="projects">View Our Work</BtnPrimary>
                <BtnOutline nav={nav} to="contact" light>Start a Project</BtnOutline>
              </div>
            </div>
            <div style={{
              position: 'absolute', top: 40, right: 60, zIndex: 1,
              fontFamily: F.body, fontSize: 11, letterSpacing: '0.28em',
              textTransform: 'uppercase', color: 'rgba(245,241,237,0.5)',
              writingMode: 'vertical-rl'
            }}></div>
          </section>

          {/* ── Stats band ── */}
          <section style={{ background: THEME.charcoal }}>
            <div style={{
              maxWidth: 1280, margin: '0 auto', padding: '56px 60px',
              display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 24
            }}>
              {stats.map((s) => (
                <div key={s.l}>
                  <div style={{ fontFamily: F.display, fontSize: 56, fontWeight: 300, color: THEME.cream, lineHeight: 1 }}>{s.n}</div>
                  <div style={{ fontFamily: F.body, fontSize: 11, letterSpacing: '0.22em', textTransform: 'uppercase', color: 'rgba(245,241,237,0.45)', marginTop: 10 }}>{s.l}</div>
                </div>
              ))}
            </div>
          </section>

          {/* ── Studio intro ── */}
          <section style={{ position: 'relative', height: '100vh', overflow: 'hidden', display: 'flex', alignItems: 'center' }}>
            <ParallaxImg src="assets/images/project1.jpg" alt="studio work" />
            <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(to right, rgba(20,18,16,0.82) 0%, rgba(20,18,16,0.55) 55%, rgba(20,18,16,0.05) 100%)' }} />
            <div style={{ position: 'relative', zIndex: 1, maxWidth: 1280, width: '100%', margin: '0 auto', padding: '80px 60px' }}>
              <div style={{ maxWidth: 560 }}>
                <Eyebrow light>About the Studio</Eyebrow>
                <h2 style={{
                  fontFamily: F.display, fontWeight: 300, fontSize: 'clamp(38px, 3.5vw, 58px)',
                  color: THEME.cream, lineHeight: 1.1, margin: '20px 0 0'
                }}>

            <div style={{ maxWidth: 520, margin: '0 auto' }}>
              <Eyebrow>Work with us</Eyebrow>
              <h2 style={{ fontFamily: F.display, fontWeight: 300, fontSize: 'clamp(34px, 3vw, 48px)', color: THEME.charcoal, lineHeight: 1.1, margin: '20px 0 32px' }}>
                Your project, next.
              </h2>
              <BtnPrimary nav={nav} to="contact">Start the Conversation</BtnPrimary>
            </div>
          </section>
        </div>
      );
    }

    function FilterBtn({ label, active, onClick }) {
      const [h, setH] = React.useState(false);
      return (
        <button
          onClick={onClick}
          onMouseOver={() => setH(true)}
          onMouseOut={() => setH(false)}
          style={{
            fontFamily: F.body, fontSize: 11, letterSpacing: '0.22em', textTransform: 'uppercase',
            padding: '9px 20px', cursor: 'pointer', transition: 'all 0.2s',
            background: active ? THEME.charcoal : (h ? 'rgba(44,44,44,0.05)' : 'transparent'),
            color: active ? THEME.cream : (h ? THEME.charcoal : 'rgba(245,241,237,0.8)'),
            border: `1px solid ${active ? THEME.charcoal : 'rgba(245,241,237,0.4)'}`,
          }}>
          {label}
        </button>
      );
    }

    function ProjectGridCard({ title, tag, year, loc, img }) {
      const [h, setH] = React.useState(false);
      const strength = 40;
      const { containerRef, imgRef } = useParallaxCard(strength);
      return (
        <div
          onMouseOver={() => setH(true)}
          onMouseOut={() => setH(false)}
          style={{ cursor: 'pointer' }}
        >
          <div ref={containerRef} style={{ aspectRatio: '4/5', overflow: 'hidden', position: 'relative' }}>
            <img
              ref={imgRef}
              src={img}
              alt={title}
              style={{
                display: 'block',
                width: '100%',
                height: `calc(100% + ${strength * 2}px)`,
                objectFit: 'cover',
                willChange: 'translate, scale',
                marginTop: `-${strength}px`,
                scale: h ? '1.06' : '1',
                transition: 'scale 0.8s cubic-bezier(0.22,1,0.36,1)',
              }}
            />
            <div style={{
              position: 'absolute', inset: 0,
              background: h ? 'rgba(44,44,44,0.32)' : 'transparent',
              transition: 'background 0.4s',
              display: 'flex', alignItems: 'flex-end', padding: '20px 24px',
            }}>
              <span style={{
                fontFamily: F.body, fontSize: 11, letterSpacing: '0.22em',
                textTransform: 'uppercase', color: THEME.cream,
                opacity: h ? 1 : 0, transition: 'opacity 0.3s',
              }}>View Project →</span>
            </div>
          </div>
          <div style={{ marginTop: 18, display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
            <div>
              <div style={{ fontFamily: F.display, fontSize: 21, color: THEME.charcoal }}>{title}</div>
              <div style={{ fontFamily: F.body, fontSize: 12, color: 'rgba(44,44,44,0.48)', marginTop: 4, fontWeight: 300 }}>{loc} · {year}</div>
            </div>
            <span style={{ fontFamily: F.body, fontSize: 11, letterSpacing: '0.2em', textTransform: 'uppercase', color: THEME.walnut }}>{tag}</span>
          </div>
        </div>
      );
    }


    // ─────────────────────────────────────────────────────────
    // CONTACT PAGE
    // ─────────────────────────────────────────────────────────

    const INITIAL = { name: '', email: '', phone: '', service: 'Interior Design', message: '' };

    function ContactPage() {
      const [form, setForm]     = React.useState(INITIAL);
      const [errors, setErrors] = React.useState({});
      const [sent, setSent]     = React.useState(false);

      const update = k => e => {
        setForm(f => ({ ...f, [k]: e.target.value }));
        setErrors(er => ({ ...er, [k]: null }));
      };

      const validate = () => {
        const e = {};
        if (!form.name.trim()) e.name = 'Please tell us your name.';
        if (!form.email.trim()) e.email = 'Email is required.';
        else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email = 'That email looks off.';
        if (form.message.trim().length < 10) e.message = 'A few more words, please.';
        return e;
      };

      const submit = ev => {
        ev.preventDefault();
        const e = validate();
        if (Object.keys(e).length) { setErrors(e); return; }
        setSent(true);
        setForm(INITIAL);
        setTimeout(() => setSent(false), 5000);
      };

      const info = [
        { label: '',        lines: ['', ''] },
        { label: 'Email',   lines: ['hello@atelieramr.com'] },
        { label: 'Phone',   lines: ['01026000056'] },
        { label: 'Hours',   lines: ['Monday — Friday', '09:30 — 18:00 WET'] },
      ];

      return (
        <div>
          {/* ── Page header ── */}
          <section style={{
            position: 'relative', height: '100vh',
            backgroundImage: 'url(assets/images/project6.jpg)',
            backgroundSize: 'cover', backgroundPosition: 'center',
            display: 'flex', alignItems: 'flex-end',
          }}>
            <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(to top, rgba(10,8,6,0.90) 0%, rgba(10,8,6,0.38) 55%, rgba(10,8,6,0.08) 100%)' }} />
            <div style={{ position: 'relative', zIndex: 1, maxWidth: 1280, width: '100%', margin: '0 auto', padding: '0 60px 72px' }}>
              <Eyebrow light>Contact</Eyebrow>
              <h1 style={{
                fontFamily: F.display, fontWeight: 300,
                fontSize: 'clamp(52px, 6vw, 88px)',
                color: THEME.cream, lineHeight: 1.05,
                margin: '20px 0 20px', maxWidth: 640,
              }}>
                Tell us about your space.
              </h1>
              <p style={{ fontFamily: F.body, fontSize: 15, fontWeight: 300, color: 'rgba(245,241,237,0.6)', maxWidth: 460, lineHeight: 1.78 }}>
                Send us a note about your project. We respond personally within two working days.
              </p>
            </div>
          </section>

          {/* ── Form + Info ── */}
          <section style={{ background: THEME.cream, padding: '0 60px 100px' }}>
            <div style={{
              maxWidth: 1280, margin: '0 auto',
              display: 'grid', gridTemplateColumns: '7fr 4fr', gap: 80, alignItems: 'start',
            }}>
              {/* Form */}
              <form onSubmit={submit} noValidate style={{
                background: 'white',
                border: '1px solid rgba(212,197,185,0.5)',
                padding: '52px 52px',
              }}>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 32 }}>
                  <FormField label="Name" id="name" error={errors.name}>
                    <FormInput id="name" type="text" value={form.name} onChange={update('name')} error={errors.name} />
                  </FormField>
                  <FormField label="Email" id="email" error={errors.email}>
                    <FormInput id="email" type="email" value={form.email} onChange={update('email')} error={errors.email} />
                  </FormField>
                  <FormField label="Phone (optional)" id="phone">
                    <FormInput id="phone" type="tel" value={form.phone} onChange={update('phone')} />
                  </FormField>
                  <FormField label="Service" id="service">
                    <select id="service" value={form.service} onChange={update('service')} style={{
                      width: '100%', background: 'transparent',
                      borderBottom: '1px solid rgba(44,44,44,0.2)',
                      padding: '10px 0', fontFamily: F.body, fontSize: 14,
                      color: THEME.charcoal, outline: 'none', cursor: 'pointer',
                      borderTop: 'none', borderLeft: 'none', borderRight: 'none',
                    }}>
                      {['Facade Design', 'Interior Design', 'Decoration', 'Full Service'].map(o => (
                        <option key={o}>{o}</option>
                      ))}
                    </select>
                  </FormField>
                </div>

                <div style={{ marginTop: 28 }}>
                  <FormField label="Project Details" id="message" error={errors.message}>
                    <textarea
                      id="message" rows={6} value={form.message} onChange={update('message')}
                      style={{
                        width: '100%', background: 'transparent', resize: 'vertical',
                        borderBottom: `1px solid ${errors.message ? '#b91c1c' : 'rgba(44,44,44,0.2)'}`,
                        borderTop: 'none', borderLeft: 'none', borderRight: 'none',
                        padding: '10px 0', fontFamily: F.body, fontSize: 14,
                        color: THEME.charcoal, outline: 'none', lineHeight: 1.65,
                        boxSizing: 'border-box',
                      }}
                    />
                  </FormField>
                </div>

                <div style={{ display: 'flex', alignItems: 'center', gap: 24, marginTop: 40 }}>
                  <BtnPrimary onClick={() => {}}>Send Enquiry</BtnPrimary>
                  {sent && (
                    <span style={{ fontFamily: F.body, fontSize: 12, letterSpacing: '0.15em', textTransform: 'uppercase', color: THEME.walnut }}>
                      Thank you — we'll be in touch.
                    </span>
                  )}
                </div>
              </form>

              {/* Info column */}
              <div style={{ paddingTop: 8 }}>
                {info.map((block, i) => (
                  <div key={block.label + i} style={{ marginBottom: 36 }}>
                    <Eyebrow style={{ marginBottom: 12 }}>{block.label}</Eyebrow>
                    {block.lines.map((line, j) => (
                      <p key={j} style={{ fontFamily: F.body, fontSize: 14, fontWeight: 300, color: 'rgba(44,44,44,0.7)', margin: '0 0 4px', lineHeight: 1.6 }}>{line}</p>
                    ))}
                    {i < info.length - 1 && <Rule style={{ marginTop: 28 }} />}
                  </div>
                ))}
              </div>
            </div>
          </section>
        </div>
      );
    }

    function FormField({ label, id, error, children }) {
      return (
        <label htmlFor={id} style={{ display: 'block' }}>
          <span style={{ fontFamily: F.body, fontSize: 11, letterSpacing: '0.22em', textTransform: 'uppercase', color: 'rgba(44,44,44,0.45)' }}>
            {label}
          </span>
          <div style={{ marginTop: 8 }}>{children}</div>
          {error && <span style={{ display: 'block', marginTop: 5, fontFamily: F.body, fontSize: 12, color: '#b91c1c' }}>{error}</span>}
        </label>
      );
    }

    function FormInput({ id, type, value, onChange, error }) {
      const [f, setF] = React.useState(false);
      return (
        <input id={id} type={type} value={value} onChange={onChange}
          onFocus={() => setF(true)} onBlur={() => setF(false)}
          style={{
            width: '100%', background: 'transparent',
            borderBottom: `1px solid ${error ? '#b91c1c' : f ? THEME.walnut : 'rgba(44,44,44,0.2)'}`,
            borderTop: 'none', borderLeft: 'none', borderRight: 'none',
            padding: '10px 0', fontFamily: F.body, fontSize: 14,
            color: THEME.charcoal, outline: 'none', transition: 'border-color 0.2s',
            boxSizing: 'border-box',
          }}
        />
      );
    }


    // ─────────────────────────────────────────────────────────
    // TWEAKS PANEL
    // ─────────────────────────────────────────────────────────

    const __TWEAKS_STYLE = `
      .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;
        max-height:calc(100vh - 32px);display:flex;flex-direction:column;
        transform:scale(var(--dc-inv-zoom,1));transform-origin:bottom right;
        background:rgba(250,249,247,.78);color:#29261b;
        -webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);
        border:.5px solid rgba(255,255,255,.6);border-radius:14px;
        box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);
        font:11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}
      .twk-hd{display:flex;align-items:center;justify-content:space-between;
        padding:10px 8px 10px 14px;cursor:move;user-select:none}
      .twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em}
      .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);
        width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}
      .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
      .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;
        overflow-y:auto;overflow-x:hidden;min-height:0;
        scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.15) transparent}
      .twk-row{display:flex;flex-direction:column;gap:5px}
      .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
      .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;color:rgba(41,38,27,.72)}
      .twk-lbl>span:first-child{font-weight:500}
      .twk-val{color:rgba(41,38,27,.5);font-variant-numeric:tabular-nums}
      .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
        color:rgba(41,38,27,.45);padding:10px 0 0}
      .twk-sect:first-child{padding-top:0}
      .twk-slider{appearance:none;-webkit-appearance:none;width:100%;height:4px;margin:6px 0;
        border-radius:999px;background:rgba(0,0,0,.12);outline:none}
      .twk-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;
        width:14px;height:14px;border-radius:50%;background:#fff;
        border:.5px solid rgba(0,0,0,.12);box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:default}
      .twk-seg{position:relative;display:flex;padding:2px;border-radius:8px;
        background:rgba(0,0,0,.06);user-select:none}
      .twk-seg-thumb{position:absolute;top:2px;bottom:2px;border-radius:6px;
        background:rgba(255,255,255,.9);box-shadow:0 1px 2px rgba(0,0,0,.12);
        transition:left .15s cubic-bezier(.3,.7,.4,1),width .15s}
      .twk-seg button{appearance:none;position:relative;z-index:1;flex:1;border:0;
        background:transparent;color:inherit;font:inherit;font-weight:500;min-height:22px;
        border-radius:6px;cursor:default;padding:4px 6px;line-height:1.2}
      .twk-toggle{position:relative;width:32px;height:18px;border:0;border-radius:999px;
        background:rgba(0,0,0,.15);transition:background .15s;cursor:default;padding:0}
      .twk-toggle[data-on="1"]{background:#34c759}
      .twk-toggle i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;
        background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .15s}
      .twk-toggle[data-on="1"] i{transform:translateX(14px)}
    `;

    function useTweaks(defaults) {
      const [values, setValues] = React.useState(defaults);
      const setTweak = React.useCallback((keyOrEdits, val) => {
        const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
          ? keyOrEdits : { [keyOrEdits]: val };
        setValues((prev) => ({ ...prev, ...edits }));
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
        window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
      }, []);
      return [values, setTweak];
    }

    function TweaksPanel({ title = 'Tweaks', children }) {
      const [open, setOpen] = React.useState(false);
      const dragRef = React.useRef(null);
      const offsetRef = React.useRef({ x: 16, y: 16 });

      React.useEffect(() => {
        const onMsg = (e) => {
          const t = e?.data?.type;
          if (t === '__activate_edit_mode') setOpen(true);
          else if (t === '__deactivate_edit_mode') setOpen(false);
        };
        window.addEventListener('message', onMsg);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', onMsg);
      }, []);

      const dismiss = () => {
        setOpen(false);
        window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
      };

      if (!open) return null;
      return (
        <>
          <style>{__TWEAKS_STYLE}</style>
          <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
            <div className="twk-hd">
              <b>{title}</b>
              <button className="twk-x" onClick={dismiss}>✕</button>
            </div>
            <div className="twk-body">{children}</div>
          </div>
        </>
      );
    }

    function TweakSection({ label, children }) {
      return <><div className="twk-sect">{label}</div>{children}</>;
    }

    function TweakRow({ label, value, children, inline = false }) {
      return (
        <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
          <div className="twk-lbl">
            <span>{label}</span>
            {value != null && <span className="twk-val">{value}</span>}
          </div>
          {children}
        </div>
      );
    }

    function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
      return (
        <TweakRow label={label} value={`${value}${unit}`}>
          <input type="range" className="twk-slider" min={min} max={max} step={step}
                 value={value} onChange={(e) => onChange(Number(e.target.value))} />
        </TweakRow>
      );
    }

    function TweakToggle({ label, value, onChange }) {
      return (
        <div className="twk-row twk-row-h">
          <div className="twk-lbl"><span>{label}</span></div>
          <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
                  onClick={() => onChange(!value)}><i /></button>
        </div>
      );
    }

    function TweakRadio({ label, value, options, onChange }) {
      const trackRef = React.useRef(null);
      const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
      const idx = Math.max(0, opts.findIndex((o) => o.value === value));
      const n = opts.length;
      return (
        <TweakRow label={label}>
          <div ref={trackRef} role="radiogroup" className="twk-seg">
            <div className="twk-seg-thumb"
                 style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                          width: `calc((100% - 4px) / ${n})` }} />
            {opts.map((o) => (
              <button key={o.value} type="button" role="radio" aria-checked={o.value === value}
                      onClick={() => onChange(o.value)}>
                {o.label}
              </button>
            ))}
          </div>
        </TweakRow>
      );
    }


    // ─────────────────────────────────────────────────────────
    // APP + ROUTING + MOTION SYSTEM
    // ─────────────────────────────────────────────────────────

    const AZ_SPEED = { fast: '0.42s', medium: '0.72s', slow: '1.15s' };

    function MotionSystem({ page }) {
      const [t, setTweak] = useTweaks(window.__MOTION_DEFAULTS__ || {
        motionEnabled: true,
        revealStyle: 'rise',
        speed: 'medium',
        dy: 36,
        stagger: true,
      });

      React.useEffect(() => {
        const r = document.documentElement;
        r.style.setProperty('--az-dur', AZ_SPEED[t.speed] || '0.72s');
        r.style.setProperty('--az-dy',  t.dy + 'px');
      }, [t.speed, t.dy]);

      React.useEffect(() => {
        let obs = null;
        const tid = setTimeout(() => {
          document.querySelectorAll('[data-az]').forEach(function(el) {
            el.removeAttribute('data-az');
            el.classList.remove('az-in');
            el.style.removeProperty('--az-del');
          });
          if (!t.motionEnabled) return;

          var targets = [];
          document.querySelectorAll('main section').forEach(function(section) {
            Array.from(section.children).forEach(function(child, ci) {
              var cs = window.getComputedStyle(child);
              if (cs.position === 'absolute' || cs.position === 'fixed') return;
              if (child.tagName !== 'DIV' && child.tagName !== 'FORM') return;
              child.setAttribute('data-az', t.revealStyle);
              child.classList.remove('az-in');
              child.style.setProperty('--az-del', t.stagger ? (ci * 0.11).toFixed(2) + 's' : '0s');
              targets.push(child);
            });
          });

          obs = new IntersectionObserver(function(entries) {
            entries.forEach(function(e) {
              if (!e.isIntersecting) return;
              e.target.classList.add('az-in');
              obs.unobserve(e.target);
            });
          }, { threshold: 0.07, rootMargin: '0px 0px -20px 0px' });

          targets.forEach(function(el) {
            var rect = el.getBoundingClientRect();
            if (rect.top < window.innerHeight && rect.bottom > 0) {
              el.style.transition = 'none';
              el.classList.add('az-in');
              requestAnimationFrame(function() { el.style.removeProperty('transition'); });
            } else {
              obs.observe(el);
            }
          });
        }, 240);

        return function() {
          clearTimeout(tid);
          if (obs) obs.disconnect();
        };
      }, [page, t.motionEnabled, t.revealStyle, t.stagger]);

      return (
        <TweaksPanel>
          <TweakSection label="Motion" />
          <TweakToggle label="Enable motion" value={t.motionEnabled}
            onChange={function(v) { setTweak('motionEnabled', v); }} />
          <TweakRadio label="Reveal style" value={t.revealStyle}
            options={['rise', 'fade', 'scale']}
            onChange={function(v) { setTweak('revealStyle', v); }} />
          <TweakRadio label="Speed" value={t.speed}
            options={['fast', 'medium', 'slow']}
            onChange={function(v) { setTweak('speed', v); }} />
          <TweakSlider label="Rise distance" value={t.dy} min={0} max={72} step={4}
            onChange={function(v) { setTweak('dy', v); }} />
          <TweakToggle label="Stagger elements" value={t.stagger}
            onChange={function(v) { setTweak('stagger', v); }} />
        </TweaksPanel>
      );
    }

    function App() {
      const [page, setPage]       = React.useState('home');
      const [fading, setFading]   = React.useState(false);
      const mainRef               = React.useRef(null);

      const navigate = React.useCallback(function(target) {
        if (target === page) return;
        setFading(true);
        setTimeout(function() {
          setPage(target);
          setFading(false);
          if (mainRef.current) {
            mainRef.current.parentElement.scrollTop = 0;
            window.scrollTo(0, 0);
          }
        }, 180);
      }, [page]);

      const pages = {
        home: HomePage, about: AboutPage, services: ServicesPage,
        projects: ProjectsPage, contact: ContactPage,
      };
      const PageComponent = pages[page] || HomePage;

      return (
        <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', background: THEME.cream }}>
          <AtNavbar page={page} nav={navigate} />
          <main
            ref={mainRef}
            style={{ flex: 1, opacity: fading ? 0 : 1, transition: 'opacity 0.18s ease' }}
          >
            <PageComponent nav={navigate} />
          </main>
          <AtFooter nav={navigate} />
          <MotionSystem page={page} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
